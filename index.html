<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hone</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230a0a0a'/><text y='22' x='7' font-size='17' font-weight='700' fill='white' font-family='serif'>H</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{
  --orange:#0a0a0a;--orange-dark:#333;--orange-light:#f5f5f4;--orange-mid:#e7e5e4;
  --green:#22c55e;--green-dark:#16a34a;--green-light:#f0fdf4;
  --blue:#3b82f6;--blue-dark:#2563eb;--blue-light:#eff6ff;
  --purple:#8b5cf6;--purple-dark:#7c3aed;--purple-light:#f5f3ff;
  --red:#ef4444;--red-light:#fef2f2;
  --yellow:#eab308;--yellow-light:#fefce8;
  --text:#0a0a0a;--text2:#64748b;--text3:#a8a8a4;
  --bg:#ffffff;--bg2:#fafaf9;--border:#e7e5e4;--border2:#d6d3d1;
  --shadow:0 1px 3px rgba(0,0,0,.06);
  --shadow-card:0 1px 2px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.04);
  --r:12px;--r-sm:8px;--r-lg:16px;--r-xl:24px;
  --sans:'Plus Jakarta Sans',system-ui,sans-serif;
  --serif:'Plus Jakarta Sans',system-ui,sans-serif;
}
html,body{height:100%;min-height:100vh}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:15px}
.screen{display:none;min-height:100vh}.screen.active{display:flex;flex-direction:column}
#homeScreen{background:var(--bg)}
.home-header{background:var(--bg);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:var(--text);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;font-size:18px;color:#fff}
.logo-name{font-family:var(--serif);font-weight:700;font-size:20px;color:var(--text);letter-spacing:-.02em}
.streak-badge{display:flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-weight:600;font-size:13px;color:var(--text2)}
.home-hero{text-align:center;padding:52px 24px 28px}
.home-hero h1{font-family:var(--serif);font-size:42px;font-weight:700;color:var(--text);margin-bottom:10px;letter-spacing:-.03em;line-height:1.08}
.home-hero p{font-size:15px;color:var(--text2);max-width:420px;margin:0 auto;line-height:1.6}
.stats-strip{display:flex;gap:10px;padding:0 24px 32px;justify-content:center;flex-wrap:wrap}
.stat-pill{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:14px 20px;text-align:center;box-shadow:var(--shadow);min-width:100px}
.stat-pill .val{font-family:var(--serif);font-size:24px;font-weight:700;color:var(--text);line-height:1}
.stat-pill .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-top:4px}
.modes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;padding:0 24px 48px;max-width:700px;margin:0 auto;width:100%}
.mode-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px;cursor:pointer;transition:all .2s;position:relative;box-shadow:var(--shadow)}
.mode-card:hover{box-shadow:var(--shadow-card);transform:translateY(-2px)}
.mode-card:active{transform:translateY(0)}
.mode-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r-lg) var(--r-lg) 0 0}
.mode-card.orange::before{background:var(--text)}
.mode-card.green::before{background:var(--green)}
.mode-card.blue::before{background:var(--blue)}
.mode-card.purple::before{background:var(--purple)}
.mode-emoji{font-size:28px;margin-bottom:14px;display:block}
.mode-name{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--text);margin-bottom:5px;letter-spacing:-.02em}
.mode-desc{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:16px}
.mode-meta{display:flex;gap:8px;align-items:center}
.mode-best{font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;background:var(--bg2);color:var(--text2);border:1px solid var(--border)}
.mode-card.orange .mode-best,.mode-card.green .mode-best,.mode-card.blue .mode-best,.mode-card.purple .mode-best{background:var(--bg2);color:var(--text2)}
.mode-plays{font-size:12px;color:var(--text3);font-weight:500}
.play-btn{margin-left:auto;padding:8px 20px;border-radius:20px;border:none;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;color:#fff;background:var(--text);transition:all .12s}
.play-btn:hover{background:#333}
#gameScreen{background:var(--bg);align-items:center}
.game-topbar{width:100%;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:14px}
.back-btn{width:34px;height:34px;border-radius:var(--r-sm);border:1px solid var(--border);background:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .12s;flex-shrink:0}
.back-btn:hover{background:var(--bg2);color:var(--text)}
.game-title{font-family:var(--serif);font-weight:700;font-size:16px;color:var(--text)}
.progress-bar-wrap{flex:1;height:7px;background:var(--bg2);border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.progress-bar-fill{height:100%;border-radius:8px;transition:width .3s ease;background:var(--text)}
.game-score-badge{font-family:var(--serif);font-weight:700;font-size:14px;color:var(--text);background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);padding:4px 12px;white-space:nowrap}
.game-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;width:100%;max-width:500px;margin:0 auto;gap:18px}
.timer-ring-wrap{position:relative;width:72px;height:72px;flex-shrink:0}
.timer-svg{width:72px;height:72px;transform:rotate(-90deg)}
.timer-bg{fill:none;stroke:var(--border);stroke-width:5}
.timer-arc{fill:none;stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .1s linear,stroke .3s}
.timer-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;font-size:18px;color:var(--text)}
.question-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:32px 28px;width:100%;text-align:center;box-shadow:var(--shadow-card)}
.q-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:12px}
.q-problem{font-family:var(--serif);font-size:42px;font-weight:700;color:var(--text);line-height:1.1;letter-spacing:-.02em;margin-bottom:6px}
.q-problem.memory-display{font-size:32px;letter-spacing:.08em;color:var(--blue-dark)}
.q-sub{font-size:14px;color:var(--text2)}
.answer-input{font-family:var(--serif);font-size:28px;font-weight:600;background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--r);padding:14px 20px;text-align:center;outline:none;width:100%;color:var(--text);transition:border-color .15s}
.answer-input:focus{border-color:var(--text)}
.answer-input.correct{border-color:var(--green);background:var(--green-light);animation:correctPop .3s ease}
.answer-input.wrong{border-color:var(--red);background:var(--red-light);animation:shake .35s ease}
@keyframes correctPop{0%{transform:scale(1)}50%{transform:scale(1.03)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
.option-btn{padding:16px;border-radius:var(--r);border:1.5px solid var(--border2);background:var(--bg);font-family:var(--serif);font-size:20px;font-weight:600;color:var(--text);cursor:pointer;transition:all .12s}
.option-btn:hover:not(:disabled){background:var(--bg2);border-color:var(--text);transform:translateY(-1px)}
.option-btn:active:not(:disabled){transform:translateY(0)}
.option-btn.correct{background:var(--green-light);border-color:var(--green);color:var(--green-dark)}
.option-btn.wrong{background:var(--red-light);border-color:var(--red);color:var(--red)}
.option-btn:disabled{cursor:default}
.submit-btn{width:100%;padding:14px;border-radius:var(--r);border:none;font-family:var(--sans);font-size:15px;font-weight:600;color:#fff;background:var(--text);cursor:pointer;transition:all .12s}
.submit-btn:hover{background:#333}
.submit-btn:active{transform:translateY(1px)}
.submit-btn:disabled{background:var(--border2);cursor:default;color:var(--text3)}
.feedback-chip{font-family:var(--sans);font-size:14px;font-weight:600;padding:8px 18px;border-radius:var(--r);text-align:center;animation:popIn .2s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.feedback-chip.correct{background:var(--green-light);color:var(--green-dark);border:1px solid #bbf7d0}
.feedback-chip.wrong{background:var(--red-light);color:var(--red);border:1px solid #fecaca}
.memory-sequence-wrap{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.mem-digit{width:48px;height:58px;border-radius:var(--r-sm);border:1.5px solid var(--border2);background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:24px;font-weight:700;color:var(--text);transition:all .2s}
.mem-digit.hidden{background:var(--text);border-color:var(--text);color:transparent}
.mem-digit.reveal{animation:flipIn .3s ease}
@keyframes flipIn{from{transform:rotateY(90deg);opacity:0}to{transform:rotateY(0);opacity:1}}
#resultsScreen{background:var(--bg);align-items:center;justify-content:center}
.results-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:40px 36px;max-width:420px;width:90%;text-align:center;box-shadow:var(--shadow-card);animation:slideUp .3s cubic-bezier(.34,1.4,.64,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.results-emoji{font-size:44px;margin-bottom:12px;display:block;animation:bounce 1s ease .3s both}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.results-title{font-family:var(--serif);font-size:26px;font-weight:700;color:var(--text);margin-bottom:6px;letter-spacing:-.02em}
.results-sub{font-size:14px;color:var(--text2);margin-bottom:24px}
.results-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:22px}
.rs-stat{background:var(--bg2);border-radius:var(--r-sm);padding:14px 8px;text-align:center;border:1px solid var(--border)}
.rs-val{font-family:var(--serif);font-size:24px;font-weight:700;color:var(--text);line-height:1}
.rs-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-top:4px}
.pb-banner{background:var(--yellow-light);border:1px solid #fde68a;border-radius:var(--r-sm);padding:10px 14px;margin-bottom:18px;font-weight:700;font-size:14px;color:#92400e;display:none}
.pb-banner.show{display:block}
.results-btns{display:flex;gap:10px}
.btn-again{flex:1;padding:13px;border-radius:var(--r);border:none;background:var(--text);color:#fff;font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;transition:all .12s}
.btn-again:hover{background:#333}
.btn-home{flex:1;padding:13px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg);color:var(--text2);font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;transition:all .12s}
.btn-home:hover{background:var(--bg2);color:var(--text)}
.countdown-overlay{position:fixed;inset:0;background:rgba(255,255,255,.96);display:none;align-items:center;justify-content:center;z-index:50;flex-direction:column;gap:8px}
.countdown-overlay.show{display:flex}
.countdown-num{font-family:var(--serif);font-size:88px;font-weight:700;color:var(--text);animation:countPop .9s cubic-bezier(.34,1.56,.64,1)}
@keyframes countPop{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}
.countdown-label{font-size:16px;font-weight:500;color:var(--text2)}
/* doodles */
.doodle{display:block;margin-bottom:14px}
.hero-doodles{position:relative;display:flex;justify-content:center;gap:40px;margin-bottom:-10px;margin-top:8px;opacity:.18;pointer-events:none}
.hero-doodle{flex-shrink:0}
.cat-tabs{display:flex;gap:4px;justify-content:center;padding:0 24px 16px;flex-wrap:wrap}
.cat-tab{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all .12s}
.cat-tab:hover{border-color:var(--border2);color:var(--text)}
.cat-tab.on{background:var(--text);color:var(--white);border-color:var(--text)}
.cat-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;padding:0 24px;margin-bottom:8px;max-width:720px;margin-left:auto;margin-right:auto;width:100%}
.gm-grid{display:grid;gap:6px;width:100%;max-width:280px;margin:0 auto}
.gm-cell{aspect-ratio:1;border-radius:var(--r-sm);border:1.5px solid var(--border2);background:var(--bg);cursor:pointer;transition:all .15s}
.gm-cell.lit{background:var(--text);border-color:var(--text)}
.gm-cell.selected{background:var(--blue-light);border-color:var(--blue)}
.gm-cell.correct{background:var(--green-light);border-color:var(--green)}
.gm-cell.wrong{background:var(--red-light);border-color:var(--red)}
.gm-cell.missed{background:var(--amber-bg);border-color:var(--amber)}
.flash-num{font-family:var(--serif);font-size:56px;font-weight:700;color:var(--text);letter-spacing:.05em;animation:flashPop .15s ease}
@keyframes flashPop{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div class="screen active" id="homeScreen">
  <div class="home-header">
    <div class="logo"><div class="logo-icon">H</div><div class="logo-name">Hone</div></div>
    <div class="streak-badge">&#128293; <span id="streakCount">0</span> day streak</div>
  </div>
  <div class="home-hero">
    <div class="hero-doodles">
      <svg class="hero-doodle" width="48" height="48" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="18" stroke="#0a0a0a" stroke-width="1.5" stroke-dasharray="4 4"/><circle cx="24" cy="24" r="6" stroke="#0a0a0a" stroke-width="1.5"/></svg>
      <svg class="hero-doodle" width="48" height="48" viewBox="0 0 48 48" fill="none"><path d="M8 40 Q24 8 40 40" stroke="#0a0a0a" stroke-width="1.5" fill="none"/><circle cx="24" cy="12" r="4" stroke="#0a0a0a" stroke-width="1.5"/></svg>
      <svg class="hero-doodle" width="48" height="48" viewBox="0 0 48 48" fill="none"><path d="M12 12 L36 12 L36 36 L12 36 Z" stroke="#0a0a0a" stroke-width="1.5" fill="none" stroke-dasharray="3 3"/><line x1="12" y1="24" x2="36" y2="24" stroke="#0a0a0a" stroke-width="1"/><line x1="24" y1="12" x2="24" y2="36" stroke="#0a0a0a" stroke-width="1"/></svg>
      <svg class="hero-doodle" width="48" height="48" viewBox="0 0 48 48" fill="none"><path d="M6 24 C6 12 18 6 24 6 C30 6 42 12 42 24 C42 36 30 42 24 42 C18 42 6 36 6 24" stroke="#0a0a0a" stroke-width="1.5" fill="none"/><path d="M18 18 L30 30 M30 18 L18 30" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round"/></svg>
      <svg class="hero-doodle" width="48" height="48" viewBox="0 0 48 48" fill="none"><path d="M24 6 L30 18 L42 20 L33 28 L35 42 L24 36 L13 42 L15 28 L6 20 L18 18 Z" stroke="#0a0a0a" stroke-width="1.5" fill="none"/></svg>
    </div>
    <h1>Sharpen your mind.</h1>
    <p>Daily drills for speed, memory, and mental clarity. Pick a mode and start training.</p>
  </div>
  <div class="stats-strip">
    <div class="stat-pill"><div class="val" id="totalSessions">0</div><div class="lbl">Sessions</div></div>
    <div class="stat-pill"><div class="val" id="totalCorrect">0</div><div class="lbl">Correct</div></div>
    <div class="stat-pill"><div class="val" id="totalAccuracy">&mdash;</div><div class="lbl">Accuracy</div></div>
    <div class="stat-pill"><div class="val" id="totalTime">0m</div><div class="lbl">Trained</div></div>
  </div>
  <div class="cat-tabs" id="catTabs"></div>
  <div id="modesContainer">
    <div class="modes-grid" id="modesGrid"></div>
  </div>
</div>
<div class="screen" id="gameScreen">
  <div class="game-topbar">
    <button class="back-btn" onclick="goHome()">&larr;</button>
    <div class="game-title" id="gameTitle">Math Sprint</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
    <div class="game-score-badge">&#10003; <span id="scoreDisplay">0</span></div>
  </div>
  <div class="game-area" id="gameArea"></div>
</div>
<div class="screen" id="resultsScreen">
  <div class="results-card">
    <span class="results-emoji" id="resultsEmoji">&#127881;</span>
    <div class="results-title" id="resultsTitle">Nice work!</div>
    <div class="results-sub" id="resultsSub">Here's how you did</div>
    <div class="results-stats">
      <div class="rs-stat"><div class="rs-val" id="r-score">0</div><div class="rs-lbl">Score</div></div>
      <div class="rs-stat"><div class="rs-val" id="r-accuracy">0%</div><div class="rs-lbl">Accuracy</div></div>
      <div class="rs-stat"><div class="rs-val" id="r-time">0s</div><div class="rs-lbl">Time</div></div>
    </div>
    <div class="pb-banner" id="pbBanner">&#127942; New personal best!</div>
    <div class="results-btns">
      <button class="btn-again" onclick="playAgain()">Play again</button>
      <button class="btn-home" onclick="goHome()">Home</button>
    </div>
  </div>
</div>
<div class="countdown-overlay" id="countdownOverlay">
  <div class="countdown-num" id="countdownNum">3</div>
  <div class="countdown-label">Get ready</div>
</div>
<script>

// ── State ──
let stats = loadStats();
let currentMode = null;
let session = {};

function loadStats(){
  try{ const r=localStorage.getItem('hone_v1'); if(r) return JSON.parse(r); }catch(e){}
  return { sessions:0, correct:0, attempts:0, timeTrained:0, streak:0, lastDay:'',
    bests:{ math:0, memory:0, patterns:0, chains:0 },
    plays:{ math:0, memory:0, patterns:0, chains:0 } };
}
function saveStats(){ localStorage.setItem('hone_v1', JSON.stringify(stats)); }

function updateStreak(){
  const today = new Date().toISOString().split('T')[0];
  if(stats.lastDay===today) return;
  const y=new Date(); y.setDate(y.getDate()-1);
  const yes=y.toISOString().split('T')[0];
  stats.streak = stats.lastDay===yes ? (stats.streak||0)+1 : 1;
  stats.lastDay=today;
  saveStats();
}

// ── Screens ──
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome(){ show('homeScreen'); renderHome(); }

var MODES = [
  {id:'math',name:'Math Sprint',cat:'Speed',color:'orange',
   desc:'Rapid-fire arithmetic. Addition, subtraction, multiplication, division — timed and relentless.',
   svg:'<rect x="4" y="4" width="32" height="32" rx="8" stroke="#0a0a0a" stroke-width="1.5"/><text x="12" y="18" font-family="serif" font-size="11" font-weight="700" fill="#0a0a0a">2+3</text><line x1="10" y1="24" x2="30" y2="24" stroke="#0a0a0a" stroke-width="1"/><text x="16" y="34" font-family="serif" font-size="12" font-weight="700" fill="#0a0a0a">5</text>'},
  {id:'rapid',name:'Rapid Comparison',cat:'Speed',color:'orange',
   desc:'Two numbers flash. Tap the bigger one. Gets insanely fast. Trains snap judgment.',
   svg:'<circle cx="12" cy="20" r="9" stroke="#0a0a0a" stroke-width="1.5" fill="none"/><circle cx="28" cy="20" r="9" stroke="#0a0a0a" stroke-width="1.5" fill="none"/><text x="9" y="24" font-family="serif" font-size="11" font-weight="700" fill="#0a0a0a">7</text><text x="25" y="24" font-family="serif" font-size="11" font-weight="700" fill="#0a0a0a">4</text>'},
  {id:'truefalse',name:'True or False',cat:'Speed',color:'orange',

  },900);

const MATH_DURATION = 60;
let mathTimer=null, mathTimeLeft=0, mathProblem={}, mathAnswered=0, mathTotal=20;

function initMode(mode){
  initSession();
  if(mode==='math') initMath();
  else if(mode==='memory') initMemory();
  else if(mode==='patterns') initPatterns();
  else if(mode==='chains') initChains();
  else if(mode==='rapid') initRapid();
  else if(mode==='fermi') initFermi();
  else if(mode==='operator') initOperator();
  else if(mode==='truefalse') initTrueFalse();
  else if(mode==='gridmem') initGridMem();
  else if(mode==='flashnum') initFlashNum();
}

function initMath(){
  mathTimeLeft=MATH_DURATION; mathAnswered=0;
  renderMathQuestion();
  startMathTimer();
}

function genMath(){
  const ops=['+','-','×','÷'];
  const op=ops[Math.floor(Math.random()*ops.length)];
  let a,b,ans;
  if(op==='+'){a=randInt(10,99);b=randInt(10,99);ans=a+b;}
  else if(op==='-'){a=randInt(20,99);b=randInt(10,a);ans=a-b;}
  else if(op==='×'){a=randInt(2,12);b=randInt(2,12);ans=a*b;}
  else{b=randInt(2,12);ans=randInt(2,12);a=b*ans;}
  return{a,b,op,ans};
}

function renderMathQuestion(){
  mathProblem=genMath();
  const area=document.getElementById('gameArea');
  setProgress(mathAnswered,mathTotal);
  area.innerHTML=`
    <div class="timer-ring-wrap">
      <svg class="timer-svg" viewBox="0 0 80 80">
        <circle class="timer-bg" cx="40" cy="40" r="34"/>
        <circle class="timer-arc" id="timerArc" cx="40" cy="40" r="34" stroke="#ff6b35"
          stroke-dasharray="${2*Math.PI*34}" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-text" id="timerText">${mathTimeLeft}</div>
    </div>
    <div class="question-card">
      <div class="q-label">What is</div>
      <div class="q-problem">${mathProblem.a} ${mathProblem.op} ${mathProblem.b} = ?</div>
    </div>
    <input class="answer-input" id="mathInput" type="number" inputmode="numeric" placeholder="Your answer" autocomplete="off"/>
    <div id="mathFeedback" style="height:36px"></div>
    <button class="submit-btn" id="mathSubmit" onclick="checkMath()">Submit</button>
  `;
  const inp=document.getElementById('mathInput');
  inp.focus();
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') checkMath(); });
  updateTimerArc();
}

function startMathTimer(){
  clearInterval(mathTimer);
  mathTimer=setInterval(()=>{
    mathTimeLeft--;
    const txt=document.getElementById('timerText');
    const arc=document.getElementById('timerArc');
    if(txt) txt.textContent=mathTimeLeft;
    if(arc){ updateTimerArc(); }
    if(arc) arc.style.stroke = mathTimeLeft<=10?'var(--red)':mathTimeLeft<=20?'var(--yellow)':'var(--orange)';
    if(mathTimeLeft<=0){ clearInterval(mathTimer); endMath(); }
  },1000);
}

function updateTimerArc(){
  const arc=document.getElementById('timerArc');
  if(!arc) return;
  const circ=2*Math.PI*34;
  const offset=circ*(1-mathTimeLeft/MATH_DURATION);
  arc.style.strokeDashoffset=offset;
}

function checkMath(){
  const inp=document.getElementById('mathInput');
  const val=parseInt(inp.value);
  if(isNaN(val)) return;
  session.attempts++;
  const fb=document.getElementById('mathFeedback');
  if(val===mathProblem.ans){
    session.correct++; mathAnswered++;
    setScore(session.correct);
    inp.classList.add('correct');
    fb.innerHTML=`<div class="feedback-chip correct">✓ Correct! +1</div>`;
    setTimeout(()=>{ inp.classList.remove('correct'); if(mathTimeLeft>0) renderMathQuestion(); },400);
  } else {
    inp.classList.add('wrong');
    fb.innerHTML=`<div class="feedback-chip wrong">✗ Answer was ${mathProblem.ans}</div>`;
    setTimeout(()=>{ inp.classList.remove('wrong'); inp.value=''; inp.focus(); },700);
  }
}

function endMath(){
  clearInterval(mathTimer);
  const elapsed=Math.round((Date.now()-session.startTime)/1000);
  finishSession(session.correct, session.attempts, elapsed, session.correct);
}

let memLevel=3, memSequence=[], memPhase='show', memQ=0, memTotal=6;

function initMemory(){
  memLevel=3; memQ=0; setScore(0); setProgress(0,memTotal);
  nextMemoryRound();
}

function nextMemoryRound(){
  if(memQ>=memTotal){ endMemory(); return; }
  memSequence=Array.from({length:memLevel},()=>randInt(1,9));
  memPhase='show';
  renderMemoryShow();
}

function renderMemoryShow(){
  const area=document.getElementById('gameArea');
  const digitsHtml=memSequence.map(d=>`<div class="mem-digit reveal">${d}</div>`).join('');
  area.innerHTML=`
    <div class="question-card">
      <div class="q-label">Memorize this sequence</div>
      <div class="memory-sequence-wrap">${digitsHtml}</div>
      <div class="q-sub" style="margin-top:16px;font-size:13px;color:var(--text3)">Disappears in <span id="memCountdown">3</span>s…</div>
    </div>
  `;
  let t=3;
  const cd=setInterval(()=>{
    t--;
    const el=document.getElementById('memCountdown');
    if(el) el.textContent=t;
    if(t<=0){ clearInterval(cd); renderMemoryInput(); }
  },1000);
}

function renderMemoryInput(){
  const area=document.getElementById('gameArea');
  const hiddenHtml=memSequence.map(()=>`<div class="mem-digit hidden">?</div>`).join('');
  area.innerHTML=`
    <div class="question-card">
      <div class="q-label">What was the sequence?</div>
      <div class="memory-sequence-wrap">${hiddenHtml}</div>
    </div>
    <input class="answer-input" id="memInput" type="number" inputmode="numeric" placeholder="Type the sequence" autocomplete="off"/>
    <div id="memFeedback" style="height:36px"></div>
    <button class="submit-btn" onclick="checkMemory()">Submit</button>
  `;
  const inp=document.getElementById('memInput');
  inp.focus();
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') checkMemory(); });
}

function checkMemory(){
  const inp=document.getElementById('memInput');
  const val=(inp.value||'').trim();
  const correct=memSequence.join('');
  session.attempts++;
  const fb=document.getElementById('memFeedback');
  if(val===correct){
    session.correct++; memQ++; memLevel++;
    setScore(session.correct); setProgress(memQ,memTotal);
    inp.classList.add('correct');
    fb.innerHTML=`<div class="feedback-chip correct">✓ Perfect! Level up 🎯</div>`;
    setTimeout(()=>nextMemoryRound(),700);
  } else {
    memQ++; if(memLevel>3) memLevel--;
    setProgress(memQ,memTotal);
    inp.classList.add('wrong');
    fb.innerHTML=`<div class="feedback-chip wrong">✗ Was: ${correct}</div>`;
    setTimeout(()=>nextMemoryRound(),900);
  }
}

function endMemory(){
  const elapsed=Math.round((Date.now()-session.startTime)/1000);
  finishSession(session.correct,session.attempts,elapsed,memLevel-3);
}

// NUMBER PATTERNS
// ══════════════════════════════
const PATTERN_RULES=[
  ()=>{ const s=randInt(1,15),d=randInt(2,8); return{seq:Array.from({length:5},(_,i)=>s+i*d),rule:'+ '+d}; },
  ()=>{ const s=randInt(50,200),d=randInt(3,15); return{seq:Array.from({length:5},(_,i)=>s-i*d),rule:'- '+d}; },
  ()=>{ const s=randInt(1,5),r=randInt(2,4); return{seq:Array.from({length:5},(_,i)=>s*Math.pow(r,i)),rule:'× '+r}; },
  ()=>{ const s=randInt(2,6); return{seq:[s,s*s,s*s*s,s*s*s*s,s*s*s*s*s],rule:'power of '+s}; },
  ()=>{ const s=randInt(1,10),d=randInt(1,5),d2=randInt(1,3); return{seq:[s,s+d,s+d+d2,s+d+d2+(d+d2),s+d+d2+(d+d2)+(d2+d+d2)],rule:'increasing step'}; },
];

let patQ=0,patTotal=10,patCurrent={};

function initPatterns(){
  patQ=0; setScore(0); setProgress(0,patTotal);
  nextPattern();
}

function nextPattern(){
  if(patQ>=patTotal){ endPatterns(); return; }
  const rule=PATTERN_RULES[Math.floor(Math.random()*PATTERN_RULES.length)]();
  const seq=rule.seq.map(Math.round);
  const ans=seq[4];
  const shown=seq.slice(0,4);
  patCurrent={shown,ans,rule:rule.rule};
  renderPattern();
}

function renderPattern(){
  const area=document.getElementById('gameArea');
  const seqHtml=patCurrent.shown.map(n=>`<span style="font-size:28px;font-weight:900;font-family:var(--serif);color:var(--text)">${n}</span>`).join('<span style="font-size:24px;color:var(--text3);margin:0 4px">→</span>');
  // Generate wrong options
  const ans=patCurrent.ans;
  const wrongs=new Set();
  while(wrongs.size<3){ const w=ans+randInt(-20,20); if(w!==ans&&w>0) wrongs.add(w); }
  const options=[ans,...wrongs].sort(()=>Math.random()-.5);
  const optsHtml=options.map(o=>`<button class="option-btn" onclick="checkPattern(${o},this)">${o}</button>`).join('');
  setProgress(patQ,patTotal);
  area.innerHTML=`
    <div class="question-card">
      <div class="q-label">What comes next?</div>
      <div style="display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:6px;margin:8px 0">${seqHtml}<span style="font-size:28px;font-weight:900;font-family:var(--serif);color:var(--text3);margin:0 4px">→</span><span style="font-size:32px;font-weight:900;font-family:var(--serif);color:var(--blue)">?</span></div>
    </div>
    <div class="options-grid">${optsHtml}</div>
    <div id="patFeedback" style="height:36px"></div>
  `;
}

function checkPattern(val,btn){
  document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
  session.attempts++;
  const fb=document.getElementById('patFeedback');
  if(val===patCurrent.ans){
    session.correct++; patQ++;
    setScore(session.correct); setProgress(patQ,patTotal);
    btn.classList.add('correct');
    fb.innerHTML=`<div class="feedback-chip correct">✓ Correct! Rule: ${patCurrent.rule}</div>`;
  } else {
    patQ++;
    setProgress(patQ,patTotal);
    btn.classList.add('wrong');
    document.querySelectorAll('.option-btn').forEach(b=>{ if(parseInt(b.textContent)===patCurrent.ans) b.classList.add('correct'); });
    fb.innerHTML=`<div class="feedback-chip wrong">✗ Was ${patCurrent.ans} (${patCurrent.rule})</div>`;
  }
  setTimeout(()=>nextPattern(),900);
}

function endPatterns(){
  const elapsed=Math.round((Date.now()-session.startTime)/1000);
  finishSession(session.correct,session.attempts,elapsed,session.correct);
}

// MENTAL CHAINS
// ══════════════════════════════
let chainQ=0,chainTotal=8,chainCurrent={};

function initChains(){
  chainQ=0; setScore(0); setProgress(0,chainTotal);
  nextChain();
}

function genChain(){
  let val=randInt(10,50);
  const ops=[];
  const steps=randInt(3,5);
  for(let i=0;i<steps;i++){
    const op=['+','-','×'][Math.floor(Math.random()*3)];
    let n;
    if(op==='+'){n=randInt(5,30);val+=n;}
    else if(op==='-'){n=randInt(5,Math.min(30,val-1));val-=n;}
    else{n=randInt(2,5);val*=n;}
    ops.push({op,n});
  }
  return{start:ops[0]?val-ops.reduce((a,o)=>o.op==='+'?a+o.n:o.op==='-'?a-o.n:a*o.n,0):val, ops, ans:val};
}

function nextChain(){
  if(chainQ>=chainTotal){ endChains(); return; }
  // Rebuild properly
  let start=randInt(10,40);
  const steps=randInt(3,4);
  const ops=[];
  let val=start;
  for(let i=0;i<steps;i++){
    const op=['+','-','×'][Math.floor(Math.random()*(i>0?3:2))];
    let n;
    if(op==='+'){n=randInt(5,25);val+=n;}
    else if(op==='-'){n=randInt(3,Math.min(20,val-5));val=Math.max(val-n,1);n=Math.abs(n);}
    else{n=randInt(2,4);val*=n;}
    ops.push({op,n});
  }
  chainCurrent={start,ops,ans:val};
  renderChain();
}

function renderChain(){
  const {start,ops}=chainCurrent;
  const stepsHtml=ops.map(o=>`<div style="font-size:18px;font-weight:700;color:var(--text2);margin:4px 0">${o.op === '×' ? '×' : o.op} ${o.n}</div>`).join('');
  setProgress(chainQ,chainTotal);
  area_render(`
    <div class="question-card">
      <div class="q-label">Start with ${start}, then…</div>
      <div style="margin:8px 0">${stepsHtml}</div>
      <div style="font-size:16px;font-weight:700;color:var(--text3);margin-top:10px">What's the result?</div>
    </div>
    <input class="answer-input" id="chainInput" type="number" inputmode="numeric" placeholder="Final answer" autocomplete="off"/>
    <div id="chainFeedback" style="height:36px"></div>
    <button class="submit-btn" onclick="checkChain()">Submit</button>
  `);
  const inp=document.getElementById('chainInput');
  inp.focus();
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') checkChain(); });
}

function area_render(html){ document.getElementById('gameArea').innerHTML=html; }

function checkChain(){
  const inp=document.getElementById('chainInput');
  const val=parseInt(inp.value);
  if(isNaN(val)) return;
  session.attempts++;
  const fb=document.getElementById('chainFeedback');
  if(val===chainCurrent.ans){
    session.correct++; chainQ++;
    setScore(session.correct); setProgress(chainQ,chainTotal);
    inp.classList.add('correct');
    fb.innerHTML=`<div class="feedback-chip correct">✓ Correct! 🔥</div>`;
    setTimeout(()=>nextChain(),600);
  } else {
    chainQ++; setProgress(chainQ,chainTotal);
    inp.classList.add('wrong');
    fb.innerHTML=`<div class="feedback-chip wrong">✗ Answer was ${chainCurrent.ans}</div>`;
    setTimeout(()=>nextChain(),900);
  }
}

function endChains(){
  const elapsed=Math.round((Date.now()-session.startTime)/1000);
  finishSession(session.correct,session.attempts,elapsed,session.correct);
}

function nextRapid(){

  // Generate two different numbers, get harder over time

  setProgress(rapidQ, 30);
  const area=document.getElementById('gameArea');
  area.innerHTML=`

      <svg class="timer-svg" viewBox="0 0 80 80">
        <circle class="timer-bg" cx="40" cy="40" r="34"/>

          stroke-dasharray="${2*Math.PI*34}" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-text" id="timerText">${rapidTimeLeft}</div>
    </div>
    <div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:-8px">Tap the bigger number</div>
    <div style="display:flex;gap:14px;width:100%">
      <button class="option-btn" style="flex:1;font-size:28px;padding:28px 16px" onclick="checkRapid(${a},${b},${a>b},this)">${a}</button>
      <button class="option-btn" style="flex:1;font-size:28px;padding:28px 16px" onclick="checkRapid(${b},${a},${b>a},this)">${b}</button>
    </div>

  updateRapidArc();
}

function startRapidTimer(){

function updateRapidArc(){

function checkRapid(picked, other, isCorrect, btn){

function endRapid(){

// ══════════════════════════════
// FERMI ESTIMATION
// ══════════════════════════════
let fermiQ=0, fermiTotal=10, fermiCurrent={};

function initFermi(){
  fermiQ=0; setScore(0); setProgress(0,fermiTotal);
  nextFermi();
}

function genFermi(){
  const types=[
    // multiplication estimates
    ()=>{ const a=randInt(15,99),b=randInt(15,99); return{q:`${a} × ${b}`,ans:a*b}; },
    ()=>{ const a=randInt(100,999),b=randInt(2,19); return{q:`${a} × ${b}`,ans:a*b}; },
    // percentage estimates
    ()=>{ const p=randInt(1,9)*5,n=randInt(50,500); return{q:`${p}% of ${n}`,ans:Math.round(p/100*n)}; },
    ()=>{ const p=randInt(1,4)*10+randInt(0,1)*5,n=randInt(200,2000); return{q:`${p}% of ${n}`,ans:Math.round(p/100*n)}; },
    // division estimates
    ()=>{ const b=randInt(3,15),ans=randInt(10,99),a=b*ans+randInt(-2,2); return{q:`${a} ÷ ${b}`,ans:Math.round(a/b)}; },
    // square estimates
    ()=>{ const n=randInt(11,35); return{q:`${n}²`,ans:n*n}; },
    // combined
    ()=>{ const a=randInt(20,60),b=randInt(20,60),c=randInt(2,8); return{q:`(${a} + ${b}) × ${c}`,ans:(a+b)*c}; },
  ];
  return types[Math.floor(Math.random()*types.length)]();
}

function nextFermi(){
  if(fermiQ>=fermiTotal){ endFermi(); return; }
  fermiCurrent = genFermi();
  const ans = fermiCurrent.ans;
  // Generate 3 wrong options at varying distances
  const spread = Math.max(Math.round(ans*0.3), 10);
  const wrongs = new Set();
  while(wrongs.size<3){
    const offset = randInt(1,3) * randInt(1, spread);
    const sign = Math.random()>.5 ? 1 : -1;
    const w = ans + sign * offset;
    if(w!==ans && w>0 && !wrongs.has(w)) wrongs.add(w);
  }
  const options = [ans,...wrongs].sort(()=>Math.random()-.5);
  setProgress(fermiQ, fermiTotal);
  const area = document.getElementById('gameArea');
  area.innerHTML=`
    <div style="font-size:13px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em">${fermiQ+1} / ${fermiTotal}</div>
    <div class="question-card">
      <div class="q-label">Estimate — don't calculate</div>
      <div class="q-problem" style="font-size:34px">${fermiCurrent.q} ≈ ?</div>
      <div style="font-size:12px;color:var(--text3);margin-top:4px">Pick the closest answer</div>
    </div>
    <div class="options-grid">
      ${options.map(o=>`<button class="option-btn" onclick="checkFermi(${o},this)">${o.toLocaleString()}</button>`).join('')}
    </div>
    <div id="fermiFeedback" style="min-height:36px;display:flex;align-items:center;justify-content:center"></div>
  `;
}

function checkFermi(val, btn){
  document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
  session.attempts++;
  const fb=document.getElementById('fermiFeedback');
  const ans=fermiCurrent.ans;
  if(val===ans){
    session.correct++; fermiQ++;
    setScore(session.correct); setProgress(fermiQ,fermiTotal);
    btn.classList.add('correct');
    fb.innerHTML=`<div class="feedback-chip correct">✓ Exactly! ${ans.toLocaleString()}</div>`;
  } else {
    fermiQ++; setProgress(fermiQ,fermiTotal);
    btn.classList.add('wrong');
    document.querySelectorAll('.option-btn').forEach(b=>{ if(parseInt(b.textContent.replace(/,/g,''))===ans) b.classList.add('correct'); });
    const pct=Math.round(Math.abs(val-ans)/ans*100);
    fb.innerHTML=`<div class="feedback-chip wrong">✗ Was ${ans.toLocaleString()} (off by ${pct}%)</div>`;
  }
  setTimeout(()=>nextFermi(),1000);
}

function endFermi(){
  const elapsed=Math.round((Date.now()-session.startTime)/1000);
  finishSession(session.correct,session.attempts,elapsed,session.correct);
}

// OPERATOR HUNT
// ══════════════════════════════
let opQ=0, opTotal=12, opCurrent={};

function initOperator(){
  opQ=0; setScore(0); setProgress(0,opTotal);
  nextOperator();
}

function genOperator(){
  const difficulty = Math.min(Math.floor(opQ/4), 2); // 0=easy, 1=medium, 2=hard
  if(difficulty===0){
    // Single operator: a ? b = result
    const ops=['+','-','×','÷'];
    const op=ops[randInt(0,3)];
    let a,b,ans;
    if(op==='+'){a=randInt(5,50);b=randInt(5,50);ans=a+b;}
    else if(op==='-'){a=randInt(20,80);b=randInt(5,a-1);ans=a-b;}
    else if(op==='×'){a=randInt(2,12);b=randInt(2,12);ans=a*b;}
    else{b=randInt(2,12);ans=randInt(2,12);a=b*ans;}
    return{display:`${a} ? ${b} = ${ans}`, answer:op, options:['+','-','×','÷']};
  } else if(difficulty===1){
    // Two numbers but trickier values
    const ops=['+','-','×','÷'];
    const op=ops[randInt(0,3)];
    let a,b,ans;
    if(op==='+'){a=randInt(25,150);b=randInt(25,150);ans=a+b;}
    else if(op==='-'){a=randInt(50,200);b=randInt(10,a-1);ans=a-b;}
    else if(op==='×'){a=randInt(6,25);b=randInt(3,15);ans=a*b;}
    else{b=randInt(3,15);ans=randInt(5,25);a=b*ans;}
    return{display:`${a} ? ${b} = ${ans}`, answer:op, options:['+','-','×','÷']};
  } else {
    // Two operators: a ? b ? c = result
    const ops=['+','-','×'];
    const op1=ops[randInt(0,2)], op2=ops[randInt(0,2)];
    const a=randInt(2,12),b=randInt(2,12),c=randInt(2,10);
    let ans;
    // Evaluate left to right for simplicity
    let step1;
    if(op1==='+') step1=a+b; else if(op1==='-') step1=a-b; else step1=a*b;
    if(op2==='+') ans=step1+c; else if(op2==='-') ans=step1-c; else ans=step1*c;
    const display = `${a} ? ${b} ? ${c} = ${ans}`;
    return{display, answer:op1+' '+op2, options:null, multi:true, a,b,c,ans,op1,op2};
  }
}

function nextOperator(){
  if(opQ>=opTotal){ endOperator(); return; }
  opCurrent = genOperator();
  setProgress(opQ, opTotal);
  const area = document.getElementById('gameArea');

  if(!opCurrent.multi){
    area.innerHTML=`
      <div style="font-size:13px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em">${opQ+1} / ${opTotal}</div>
      <div class="question-card">
        <div class="q-label">Find the operator</div>
        <div class="q-problem" style="font-size:32px">${opCurrent.display}</div>
      </div>
      <div class="options-grid">
        ${opCurrent.options.map(o=>`<button class="option-btn" style="font-size:24px" onclick="checkOperator('${o}',this)">${o}</button>`).join('')}
      </div>
      <div id="opFeedback" style="height:36px;display:flex;align-items:center;justify-content:center"></div>
    `;
  } else {
    // Two operator mode — show two rows of buttons
    const ops=['+','-','×'];
    area.innerHTML=`
      <div style="font-size:13px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em">${opQ+1} / ${opTotal}</div>
      <div class="question-card">
        <div class="q-label">Find both operators (left to right)</div>
        <div class="q-problem" style="font-size:28px">${opCurrent.display}</div>
      </div>
      <div style="width:100%">
        <div style="font-size:12px;color:var(--text3);font-weight:600;margin-bottom:6px">First operator</div>
        <div class="options-grid" style="grid-template-columns:1fr 1fr 1fr;margin-bottom:12px">
          ${ops.map(o=>`<button class="option-btn op1-btn" style="font-size:22px" onclick="pickOp1('${o}',this)">${o}</button>`).join('')}
        </div>
        <div style="font-size:12px;color:var(--text3);font-weight:600;margin-bottom:6px">Second operator</div>
        <div class="options-grid" style="grid-template-columns:1fr 1fr 1fr">
          ${ops.map(o=>`<button class="option-btn op2-btn" style="font-size:22px" onclick="pickOp2('${o}',this)">${o}</button>`).join('')}
        </div>
      </div>
      <button class="submit-btn" id="opSubmitBtn" onclick="submitOperator()" disabled>Check</button>
      <div id="opFeedback" style="height:36px;display:flex;align-items:center;justify-content:center"></div>
    `;
  }
}

let selectedOp1=null, selectedOp2=null;
function pickOp1(op, btn){
  selectedOp1=op;
  document.querySelectorAll('.op1-btn').forEach(b=>{b.style.background='';b.style.borderColor='';b.style.color=''});
  btn.style.background='var(--bg2)';btn.style.borderColor='var(--text)';
  if(selectedOp1&&selectedOp2) document.getElementById('opSubmitBtn').disabled=false;
}
function pickOp2(op, btn){
  selectedOp2=op;
  document.querySelectorAll('.op2-btn').forEach(b=>{b.style.background='';b.style.borderColor='';b.style.color=''});
  btn.style.background='var(--bg2)';btn.style.borderColor='var(--text)';
  if(selectedOp1&&selectedOp2) document.getElementById('opSubmitBtn').disabled=false;
}
function submitOperator(){
  if(!selectedOp1||!selectedOp2) return;
  session.attempts++;
  const fb=document.getElementById('opFeedback');
  const correct = selectedOp1===opCurrent.op1 && selectedOp2===opCurrent.op2;
  document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
  document.getElementById('opSubmitBtn').disabled=true;
  if(correct){
    session.correct++; opQ++;
    setScore(session.correct); setProgress(opQ,opTotal);
    fb.innerHTML=`<div class="feedback-chip correct">✓ ${opCurrent.op1} and ${opCurrent.op2}</div>`;
  } else {
    opQ++; setProgress(opQ,opTotal);
    fb.innerHTML=`<div class="feedback-chip wrong">✗ Was ${opCurrent.op1} and ${opCurrent.op2}</div>`;
  }
  selectedOp1=null; selectedOp2=null;
  setTimeout(()=>nextOperator(),900);
}

function checkOperator(val, btn){
  document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
  session.attempts++;
  const fb=document.getElementById('opFeedback');
  if(val===opCurrent.answer){
    session.correct++; opQ++;
    setScore(session.correct); setProgress(opQ,opTotal);
    btn.classList.add('correct');
    fb.innerHTML=`<div class="feedback-chip correct">✓ It's ${opCurrent.answer}</div>`;
  } else {
    opQ++; setProgress(opQ,opTotal);
    btn.classList.add('wrong');
    document.querySelectorAll('.option-btn').forEach(b=>{ if(b.textContent===opCurrent.answer) b.classList.add('correct'); });
    fb.innerHTML=`<div class="feedback-chip wrong">✗ Was ${opCurrent.answer}</div>`;
  }
  setTimeout(()=>nextOperator(),800);
}

function endOperator(){
  const elapsed=Math.round((Date.now()-session.startTime)/1000);
  finishSession(session.correct,session.attempts,elapsed,session.correct);
}

// ══════════════════════════════
// TRUE OR FALSE
// ══════════════════════════════
let tfQ=0, tfTotal=15, tfCurrent={};

function initTrueFalse(){
  tfQ=0; setScore(0); setProgress(0,tfTotal);
  nextTF();
}

function genTF(){
  const types = [
    // Comparison: a × b > c
    ()=>{
      const a=randInt(3,15),b=randInt(3,15),c=randInt(10,200);
      const real=a*b;
      const isTrue=real>c;
      return{statement:`${a} × ${b} > ${c}`, isTrue};
    },
    // Comparison: a + b < c
    ()=>{
      const a=randInt(10,99),b=randInt(10,99),c=randInt(50,250);
      const real=a+b;
      const isTrue=real<c;
      return{statement:`${a} + ${b} < ${c}`, isTrue};
    },
    // Equality: a × b = c (sometimes true sometimes false)
    ()=>{
      const a=randInt(3,12),b=randInt(3,12);
      const real=a*b;
      const fake=Math.random()>.5;
      const shown=fake?real+randInt(1,5)*(Math.random()>.5?1:-1):real;
      return{statement:`${a} × ${b} = ${shown}`, isTrue:shown===real};
    },
    // Square: n² = x
    ()=>{
      const n=randInt(4,20);
      const real=n*n;
      const fake=Math.random()>.5;
      const shown=fake?real+randInt(1,10)*(Math.random()>.5?1:-1):real;
      return{statement:`${n}² = ${shown}`, isTrue:shown===real};
    },
    // Division: a ÷ b = c
    ()=>{
      const b=randInt(2,12),c=randInt(2,15);
      const a=b*c;
      const fake=Math.random()>.5;
      const shownC=fake?c+randInt(1,3)*(Math.random()>.5?1:-1):c;
      return{statement:`${a} ÷ ${b} = ${shownC}`, isTrue:shownC===c};
    },
    // Percentage: x% of n > m
    ()=>{
      const p=randInt(1,9)*10,n=randInt(50,300);
      const real=Math.round(p/100*n);
      const m=real+randInt(-20,20);
      return{statement:`${p}% of ${n} > ${m}`, isTrue:real>m};
    },
    // Chained: a + b - c > d
    ()=>{
      const a=randInt(20,80),b=randInt(10,40),c=randInt(5,30),d=randInt(20,100);
      const real=a+b-c;
      return{statement:`${a} + ${b} - ${c} > ${d}`, isTrue:real>d};
    },
  ];
  return types[Math.floor(Math.random()*types.length)]();
}

function nextTF(){
  if(tfQ>=tfTotal){ endTF(); return; }
  tfCurrent = genTF();
  setProgress(tfQ, tfTotal);
  const area = document.getElementById('gameArea');
  area.innerHTML=`
    <div style="font-size:13px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em">${tfQ+1} / ${tfTotal}</div>
    <div class="question-card">
      <div class="q-label">True or false?</div>
      <div class="q-problem" style="font-size:30px">${tfCurrent.statement}</div>
    </div>
    <div style="display:flex;gap:12px;width:100%">
      <button class="option-btn" style="flex:1;font-size:18px;padding:20px" onclick="checkTF(true,this)">True ✓</button>
      <button class="option-btn" style="flex:1;font-size:18px;padding:20px" onclick="checkTF(false,this)">False ✗</button>
    </div>
    <div id="tfFeedback" style="height:36px;display:flex;align-items:center;justify-content:center"></div>
  `;
}

function checkTF(answer, btn){
  document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
  session.attempts++;
  const fb=document.getElementById('tfFeedback');
  const correct = answer===tfCurrent.isTrue;
  if(correct){
    session.correct++; tfQ++;
    setScore(session.correct); setProgress(tfQ,tfTotal);
    btn.classList.add('correct');
    fb.innerHTML=`<div class="feedback-chip correct">✓ Correct!</div>`;
  } else {
    tfQ++; setProgress(tfQ,tfTotal);
    btn.classList.add('wrong');
    fb.innerHTML=`<div class="feedback-chip wrong">✗ It was ${tfCurrent.isTrue?'True':'False'}</div>`;
  }
  setTimeout(()=>nextTF(),800);
}

function endTF(){
  const elapsed=Math.round((Date.now()-session.startTime)/1000);
  finishSession(session.correct,session.attempts,elapsed,session.correct);
}

// ══════════════════════════════
// GRID MEMORY
// ══════════════════════════════
let gmSize=4, gmLit=[], gmSelected=[], gmQ=0, gmTotal=8, gmExpectedCount=3;

function initGridMem(){
  gmSize=4; gmQ=0; gmExpectedCount=3;
  setScore(0); setProgress(0,gmTotal);
  nextGridMem();
}

function nextGridMem(){
  if(gmQ>=gmTotal){ endGridMem(); return; }
  // Increase difficulty
  gmExpectedCount = Math.min(3 + Math.floor(gmQ/2), 8);
  if(gmQ>=6) gmSize=5;
  // Pick random cells to light up
  var totalCells = gmSize*gmSize;
  gmLit=[]; gmSelected=[];
  while(gmLit.length<gmExpectedCount){
    var c=randInt(0,totalCells-1);
    if(gmLit.indexOf(c)<0) gmLit.push(c);
  }
  setProgress(gmQ,gmTotal);
  showGridLit();
}

function showGridLit(){
  var area=document.getElementById('gameArea');
  var cells='';
  for(var i=0;i<gmSize*gmSize;i++){
    cells+='<div class="gm-cell'+(gmLit.indexOf(i)>=0?' lit':'')+'"></div>';
  }
  area.innerHTML=
    '<div style="font-size:13px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em">'+( gmQ+1)+' / '+gmTotal+'</div>'+
    '<div style="font-size:14px;color:var(--text2);font-weight:500">Memorize the pattern</div>'+
    '<div class="gm-grid" style="grid-template-columns:repeat('+gmSize+',1fr)">'+cells+'</div>';
  // Show for a duration then hide
  var showTime = Math.max(1200, 2000 - gmQ*100);
  setTimeout(function(){ showGridInput(); }, showTime);
}

function showGridInput(){
  var area=document.getElementById('gameArea');
  var cells='';
  for(var i=0;i<gmSize*gmSize;i++){
    cells+='<div class="gm-cell" data-idx="'+i+'" onclick="toggleGridCell('+i+',this)"></div>';
  }
  area.innerHTML=
    '<div style="font-size:13px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em">'+(gmQ+1)+' / '+gmTotal+'</div>'+
    '<div style="font-size:14px;color:var(--text2);font-weight:500">Tap the cells that were lit ('+gmExpectedCount+')</div>'+
    '<div class="gm-grid" style="grid-template-columns:repeat('+gmSize+',1fr)">'+cells+'</div>'+
    '<button class="submit-btn" style="max-width:200px" onclick="checkGridMem()">Check</button>';
}

function toggleGridCell(idx, el){
  var pos=gmSelected.indexOf(idx);
  if(pos>=0){
    gmSelected.splice(pos,1);
    el.classList.remove('selected');
  } else {
    gmSelected.push(idx);
    el.classList.add('selected');
  }
}

function checkGridMem(){
  session.attempts++;
  var allCorrect=true;
  // Show results on grid
  document.querySelectorAll('.gm-cell').forEach(function(cell){
    var idx=parseInt(cell.dataset.idx);
    cell.onclick=null;
    cell.style.cursor='default';
    var wasLit=gmLit.indexOf(idx)>=0;
    var wasSelected=gmSelected.indexOf(idx)>=0;
    if(wasLit&&wasSelected) cell.className='gm-cell correct';
    else if(!wasLit&&wasSelected){ cell.className='gm-cell wrong'; allCorrect=false; }
    else if(wasLit&&!wasSelected){ cell.className='gm-cell missed'; allCorrect=false; }
  });
  if(allCorrect){
    session.correct++;
    setScore(session.correct);
  }
  gmQ++;
  setProgress(gmQ,gmTotal);
  setTimeout(function(){ nextGridMem(); }, 1000);
}

function endGridMem(){
  var elapsed=Math.round((Date.now()-session.startTime)/1000);
  finishSession(session.correct,session.attempts,elapsed,session.correct);
}

// FLASH NUMBER
// ══════════════════════════════
let fnDigits=3, fnQ=0, fnTotal=10, fnCurrent='';

function initFlashNum(){
  fnDigits=3; fnQ=0;
  setScore(0); setProgress(0,fnTotal);
  nextFlashNum();
}

function nextFlashNum(){
  if(fnQ>=fnTotal){ endFlashNum(); return; }

  var num='';
  for(var i=0;i<fnDigits;i++) num+=randInt(i===0?1:0,9);
  fnCurrent=num;
  setProgress(fnQ,fnTotal);
  // Show the number briefly
  var area=document.getElementById('gameArea');
  area.innerHTML=
    '<div style="font-size:13px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em">'+(fnQ+1)+' / '+fnTotal+'</div>'+
    '<div class="question-card"><div class="q-label">Remember this number</div><div class="flash-num">'+num+'</div></div>';
  var flashTime = Math.max(400, 800 - fnQ*40);

}

function showFlashInput(){
  var area=document.getElementById('gameArea');
  area.innerHTML=
    '<div style="font-size:13px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em">'+(fnQ+1)+' / '+fnTotal+'</div>'+
    '<div class="question-card"><div class="q-label">What was the number?</div><div style="font-family:var(--serif);font-size:32px;color:var(--text3)">'+fnCurrent.replace(/./g,'•')+'</div></div>'+
    '<input class="answer-input" id="fnInput" type="number" inputmode="numeric" placeholder="Type it" autocomplete="off"/>'+
    '<div id="fnFeedback" style="height:32px"></div>'+
    '<button class="submit-btn" onclick="checkFlashNum()">Submit</button>';
  var inp=document.getElementById('fnInput');
  inp.focus();
  inp.addEventListener('keydown',function(e){ if(e.key==='Enter') checkFlashNum(); });
}

function checkFlashNum(){
  var inp=document.getElementById('fnInput');
  var val=(inp.value||'').trim();
  if(!val) return;
  session.attempts++;
  var fb=document.getElementById('fnFeedback');
  if(val===fnCurrent){
    session.correct++; fnQ++;
    if(fnQ%3===0) fnDigits++; // Increase digits every 3 correct
    setScore(session.correct); setProgress(fnQ,fnTotal);
    inp.classList.add('correct');
    fb.innerHTML='<div class="feedback-chip correct">✓ Correct!</div>';
    setTimeout(function(){ nextFlashNum(); },500);
  } else {
    fnQ++; setProgress(fnQ,fnTotal);
    inp.classList.add('wrong');
    fb.innerHTML='<div class="feedback-chip wrong">✗ Was '+fnCurrent+'</div>';
    setTimeout(function(){ nextFlashNum(); },800);
  }
}

function endFlashNum(){
  var elapsed=Math.round((Date.now()-session.startTime)/1000);
  finishSession(session.correct,session.attempts,elapsed,session.correct);
}

// ── Finish ──
function finishSession(correct,attempts,elapsed,score){
  clearInterval(mathTimer);
  stats.sessions++;
  stats.correct+=correct;
  stats.attempts+=attempts;
  stats.timeTrained+=elapsed;
  stats.plays[currentMode]=(stats.plays[currentMode]||0)+1;
  const isPB = score > (stats.bests[currentMode]||0);
  if(isPB) stats.bests[currentMode]=score;
  saveStats();

  const acc=attempts?Math.round(correct/attempts*100):0;
  const titles={math:'Sprint complete!',memory:'Memory done!',patterns:'Pattern master!',chains:'Chain broken!',rapid:'Lightning fast!',fermi:'Estimation done!',operator:'Hunt complete!',truefalse:'Quick thinker!',gridmem:'Grid cleared!',flashnum:'Sharp eyes!'};
  const emojis={math:'⚡',memory:'🧩',patterns:'🔢',chains:'🔗',rapid:'👁️',fermi:'🎯',operator:'🔍',truefalse:'✅',gridmem:'🟦',flashnum:'💡'};
  document.getElementById('resultsEmoji').textContent=emojis[currentMode];
  document.getElementById('resultsTitle').textContent=titles[currentMode];
  document.getElementById('resultsSub').textContent=`${correct} correct out of ${attempts} attempts`;
  document.getElementById('r-score').textContent=score;
  document.getElementById('r-accuracy').textContent=acc+'%';
  document.getElementById('r-time').textContent=elapsed+'s';
  document.getElementById('pbBanner').classList.toggle('show',isPB);
  show('resultsScreen');
}

function playAgain(){ startMode(currentMode); }

function randInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

// ── Init ──
renderHome();

</script>
